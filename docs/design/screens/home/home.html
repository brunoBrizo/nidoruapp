<html lang="en"><head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nidoru - Nightly Ritual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Nunito:wght@400;500&amp;display=swap" rel="stylesheet">
    <style>
      :root {
      --void: #0D0F1A;
      --midnight-blue: #0F1230;
      --deep-ink: #14172B;
      --midnight: #1C2040;
      --iris: #7C6FCD;
      --lavender: #A89CE0;
      --moonstone: #5EC4D4;
      --cloud: #EEF0FF;
      --mist: #8A8FA8;
      --haze: #4A4E6A;
      }
      body {
      font-family: 'Nunito', sans-serif;
      background-color: #000; /* Outer canvas background */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      }
      .font-inter {
      font-family: 'Inter', sans-serif;
      }
      /* Custom Animations */
      @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes orb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.85; box-shadow: 0 0 24px rgba(124,111,205,0.5); }
      50% { transform: scale(1.04); opacity: 1; box-shadow: 0 0 40px rgba(168,156,224,0.75); }
      }
      @keyframes ring-expand {
      0%, 100% { transform: scale(0.95); opacity: 0.2; }
      50% { transform: scale(1.08); opacity: 0.05; }
      }
      @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
      }
      .animate-fade-in-1 { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
      .animate-fade-in-2 { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; }
      .animate-fade-in-3 { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
      .animate-fade-in-4 { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; opacity: 0; }
      .animate-fade-in-5 { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
      .orb-core {
      animation: orb-pulse 6s ease-in-out infinite;
      }
      .orb-ring {
      animation: ring-expand 6s ease-in-out infinite;
      }
      .orb-glow {
      animation: glow-pulse 6s ease-in-out infinite;
      }
      /* Hide scrollbar for a cleaner mobile feel */
      .scrollbar-hide::-webkit-scrollbar {
      display: none;
      }
      .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen text-[#EEF0FF]">
    <!-- Native Mobile Canvas Simulation -->
    <div class="w-full max-w-[390px] h-[844px] bg-[#0D0F1A] relative overflow-hidden shadow-2xl sm:rounded-[40px] sm:border-[8px] sm:border-[#0F1230] flex flex-col">
      <!-- Scrollable Content Area -->
      <main class="flex-1 overflow-y-auto scrollbar-hide px-5 pt-12 pb-[96px] space-y-4 relative z-10">
        <!-- 1. Greeting & Streak -->
        <header class="flex justify-between items-start animate-fade-in-1">
          <div class="space-y-1">
            <h1 class="text-xl tracking-tight font-medium text-[#EEF0FF]">
              Good evening, Bruno
            </h1>
            <p class="text-sm text-[#8A8FA8] font-normal">
              Tonight’s wind-down is ready
            </p>
          </div>
          <div class="flex items-center gap-1.5 bg-[#14172B] px-3 py-1.5 rounded-full border border-[#EEF0FF]/5 shadow-sm">
            <iconify-icon icon="solar:moon-fog-linear" class="text-[#7C6FCD] text-base" stroke-width="1.5"></iconify-icon>
            <span class="font-inter text-sm font-medium text-[#EEF0FF]">
              8 days
            </span>
          </div>
        </header>

        <!-- 2. Primary Action Card (Glassmorphism & Orb) -->
        <section class="bg-[#14172B]/50 backdrop-blur-xl rounded-[24px] p-4 relative overflow-hidden animate-fade-in-2 shadow-[inset_0_1px_0_rgba(238,240,255,0.1),0_8px_32px_rgba(124,111,205,0.25)]">
          <!-- Soft background glow for the orb -->
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-[#7C6FCD]/20 rounded-full blur-[48px] pointer-events-none"></div>

          <div class="text-center z-10 relative space-y-1 mb-4 mt-1">
            <h2 class="text-lg tracking-tight font-medium text-[#EEF0FF]">
              Evening Wind-Down
            </h2>
            <p class="text-sm text-[#8A8FA8] font-normal">
              <span class="font-inter">4-7-8</span>
              breathing ·
              <span class="font-inter">20</span>
              min sounds
            </p>
          </div>

          <!-- Central Breathing Orb -->
          <div class="relative h-28 flex items-center justify-center mb-5 z-10">
            <!-- Rhythm cue: 4-7-8 Timing Arcs -->
            <svg class="absolute w-[116px] h-[116px] -rotate-90 z-0" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="48" fill="none" stroke="#7C6FCD" stroke-width="0.5" class="opacity-15"></circle>
              <!-- Inhale (4) -->
              <circle cx="50" cy="50" r="48" fill="none" stroke="#7C6FCD" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="60 241.6" stroke-dashoffset="0" class="opacity-70"></circle>
              <!-- Hold (7) -->
              <circle cx="50" cy="50" r="48" fill="none" stroke="#A89CE0" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="106 195.6" stroke-dashoffset="-66" class="opacity-50"></circle>
              <!-- Exhale (8) -->
              <circle cx="50" cy="50" r="48" fill="none" stroke="#8A8FA8" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="117 184.6" stroke-dashoffset="-178" class="opacity-40"></circle>
            </svg>

            <!-- One very subtle pulse ring -->
            <div class="absolute w-[84px] h-[84px] rounded-full border border-[#7C6FCD]/20 orb-ring z-10"></div>

            <!-- Faint Lavender outer ring -->
            <div class="absolute w-[68px] h-[68px] rounded-full border border-[#A89CE0]/15 bg-[#7C6FCD]/5 backdrop-blur-sm shadow-[inset_0_0_12px_rgba(168,156,224,0.1)] z-10"></div>

            <!-- Soft inner glow -->
            <div class="absolute w-[56px] h-[56px] rounded-full bg-gradient-to-tr from-[#7C6FCD]/40 to-[#A89CE0]/40 blur-lg shadow-[0_0_24px_rgba(168,156,224,0.4)] z-10 orb-glow"></div>

            <!-- Iris core -->
            <div class="relative w-[42px] h-[42px] rounded-full shadow-[0_0_24px_rgba(124,111,205,0.5)] z-20 orb-core overflow-hidden">
              <div class="absolute inset-0 bg-gradient-to-tr from-[#7C6FCD] to-[#A89CE0] opacity-90"></div>
              <div class="absolute inset-0 bg-gradient-to-b from-white/30 to-transparent mix-blend-overlay"></div>
            </div>
          </div>

          <button class="w-full h-12 bg-[#7C6FCD]/85 backdrop-blur-md text-[#EEF0FF] rounded-[16px] font-medium text-sm active:scale-[0.96] transition-all duration-200 ease-out z-10 relative shadow-[inset_0_1px_0_rgba(255,255,255,0.15)]">
            Start now
          </button>
        </section>

        <!-- 3. Quick Actions -->
        <section class="grid grid-cols-3 gap-3 animate-fade-in-3">
          <!-- Rescue Me (No red dot, calm) -->
          <button class="bg-[#14172B]/50 hover:bg-[#1C2040]/80 rounded-[16px] py-3 flex flex-col items-center justify-center gap-1.5 active:scale-[0.96] transition-all duration-200 group shadow-[inset_0_1px_0_rgba(238,240,255,0.08)] min-h-[80px]">
            <iconify-icon icon="lucide:heart" class="text-[#8A8FA8] group-hover:text-[#EEF0FF] text-[20px] transition-colors" stroke-width="1.5"></iconify-icon>
            <div class="flex flex-col items-center">
              <span class="text-sm font-medium text-[#EEF0FF] leading-tight">
                Rescue Me
              </span>
              <span class="text-xs font-normal text-[#8A8FA8]">Immediate</span>
            </div>
          </button>

          <!-- Sounds -->
          <button class="bg-[#14172B]/50 hover:bg-[#1C2040]/80 rounded-[16px] py-3 flex flex-col items-center justify-center gap-1.5 active:scale-[0.96] transition-all duration-200 group shadow-[inset_0_1px_0_rgba(238,240,255,0.08)] min-h-[80px]">
            <iconify-icon icon="lucide:music" class="text-[#8A8FA8] group-hover:text-[#EEF0FF] text-[20px] transition-colors" stroke-width="1.5"></iconify-icon>
            <div class="flex flex-col items-center">
              <span class="text-sm font-medium text-[#EEF0FF] leading-tight">
                Sounds
              </span>
              <span class="text-xs font-normal text-[#8A8FA8]">Mixer</span>
            </div>
          </button>

          <!-- Breathe -->
          <button class="bg-[#14172B]/50 hover:bg-[#1C2040]/80 rounded-[16px] py-3 flex flex-col items-center justify-center gap-1.5 active:scale-[0.96] transition-all duration-200 group shadow-[inset_0_1px_0_rgba(238,240,255,0.08)] min-h-[80px]">
            <iconify-icon icon="lucide:wind" class="text-[#8A8FA8] group-hover:text-[#EEF0FF] text-[20px] transition-colors" stroke-width="1.5"></iconify-icon>
            <div class="flex flex-col items-center">
              <span class="text-sm font-medium text-[#EEF0FF] leading-tight">
                Breathe
              </span>
              <span class="text-xs font-normal text-[#8A8FA8]">
                Just the orb
              </span>
            </div>
          </button>
        </section>

        <!-- 4. Sleep Check-in (Last night) -->
        <section class="bg-[#14172B]/50 rounded-[20px] p-4 animate-fade-in-4 relative group cursor-pointer active:scale-[0.98] transition-transform duration-200 shadow-[inset_0_1px_0_rgba(238,240,255,0.08)]">
          <div class="flex justify-between items-center mb-2">
            <span class="text-sm text-[#8A8FA8] font-normal">Last night</span>
            <span class="font-inter text-[11px] text-[#EEF0FF] font-medium tabular-nums bg-[#0D0F1A]/40 px-2 py-1 rounded-md shadow-[inset_0_1px_0_rgba(238,240,255,0.08)] ring-1 ring-white/5">
              4/5
            </span>
          </div>
          <div class="space-y-0.5 mb-3">
            <p class="text-base font-medium text-[#EEF0FF] leading-snug">
              Rain helped you settle
            </p>
            <p class="text-sm text-[#8A8FA8] font-normal">
              Box breathing may help tonight.
            </p>
          </div>
          <div class="flex items-center gap-1.5 text-[#7C6FCD] text-sm font-medium py-2 -my-2">
            View insight
            <iconify-icon icon="solar:arrow-right-linear" class="text-sm" stroke-width="1.5"></iconify-icon>
          </div>
        </section>

        <!-- 5. Progress / Rhythm Strip -->
        <section class="space-y-3 animate-fade-in-5 px-1">
          <div class="flex justify-between items-end">
            <h3 class="text-sm font-medium text-[#EEF0FF]">
              Your sleep rhythm
            </h3>
            <span class="font-inter text-xs text-[#8A8FA8] font-normal">
              This week
            </span>
          </div>

          <div class="flex justify-between items-center w-full h-8">
            <!-- Past days (completed) -->
            <div class="w-8 h-1.5 rounded-full bg-[#7C6FCD] opacity-40"></div>
            <div class="w-8 h-1.5 rounded-full bg-[#7C6FCD] opacity-60"></div>
            <div class="w-8 h-1.5 rounded-full bg-[#7C6FCD] opacity-80"></div>
            <div class="w-8 h-1.5 rounded-full bg-[#7C6FCD]"></div>
            <!-- Past day (paused/missed) - subdued -->
            <div class="w-8 h-1.5 rounded-full bg-[#1C2040]"></div>
            <!-- Today (completed) -->
            <div class="w-8 h-1.5 rounded-full bg-[#7C6FCD] shadow-[0_0_8px_rgba(124,111,205,0.4)] relative">
              <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[#A89CE0] rounded-full"></div>
            </div>
            <!-- Future day -->
            <div class="w-8 h-1.5 rounded-full bg-transparent border border-[#1C2040]"></div>
          </div>
        </section>
      </main>

      <!-- 6. Fixed Bottom Navigation -->
      <nav class="absolute bottom-0 w-full h-[84px] bg-[#0D0F1A]/90 backdrop-blur-xl border-t border-[#1C2040] flex justify-around items-start pt-2.5 pb-safe z-50 px-2">
        <!-- Home (Active) -->
        <button class="flex flex-col items-center gap-1 w-16 group">
          <div class="relative flex items-center justify-center">
            <iconify-icon icon="solar:home-smile-linear" class="text-[#7C6FCD] text-2xl transition-transform group-active:scale-95" stroke-width="1.5"></iconify-icon>
          </div>
          <span class="text-xs font-medium text-[#7C6FCD]">Home</span>
        </button>

        <!-- Sleep -->
        <button class="flex flex-col items-center gap-1 w-16 group">
          <iconify-icon icon="solar:moon-sleep-linear" class="group-hover:text-[#EEF0FF] text-2xl transition-all group-active:scale-95 text-[#A0A5C0]" stroke-width="1.5"></iconify-icon>
          <span class="text-xs font-normal group-hover:text-[#EEF0FF] transition-colors text-[#A0A5C0]">
            Sleep
          </span>
        </button>

        <!-- Breathe -->
        <button class="flex flex-col items-center gap-1 w-16 group">
          <iconify-icon icon="solar:wind-linear" class="group-hover:text-[#EEF0FF] text-2xl transition-all group-active:scale-95 text-[#A0A5C0]" stroke-width="1.5"></iconify-icon>
          <span class="text-xs font-normal group-hover:text-[#EEF0FF] transition-colors text-[#A0A5C0]">
            Breathe
          </span>
        </button>

        <!-- Progress -->
        <button class="flex flex-col items-center gap-1 w-16 group">
          <iconify-icon icon="solar:chart-linear" class="group-hover:text-[#EEF0FF] text-2xl transition-all group-active:scale-95 text-[#A0A5C0]" stroke-width="1.5"></iconify-icon>
          <span class="text-xs font-normal group-hover:text-[#EEF0FF] transition-colors text-[#A0A5C0]">
            Progress
          </span>
        </button>

        <!-- Profile -->
        <button class="flex flex-col items-center gap-1 w-16 group">
          <iconify-icon icon="solar:user-linear" class="group-hover:text-[#EEF0FF] text-2xl transition-all group-active:scale-95 text-[#A0A5C0]" stroke-width="1.5"></iconify-icon>
          <span class="text-xs font-normal group-hover:text-[#EEF0FF] transition-colors text-[#A0A5C0]">
            Profile
          </span>
        </button>

        <!-- Bottom Home Indicator for native feel -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-1 bg-[#EEF0FF]/20 rounded-full"></div>
      </nav>

      <!-- Top Safe Area Gradient / Blur (optional for native feel) -->
      <div class="absolute top-0 w-full h-10 bg-gradient-to-b from-[#0D0F1A] to-transparent pointer-events-none z-20"></div>
    </div>
  
</body></html>
