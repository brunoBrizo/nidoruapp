<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>nidoru - What should we call you?</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Nunito', sans-serif;
background-color: #0D0F1A;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
margin: 0;
padding: 0;
}
/* Screen Entrance */
@keyframes fade-up-enter {
0% { opacity: 0; transform: translateY(12px); }
100% { opacity: 1; transform: translateY(0); }
}
.animate-fade-up {
animation: fade-up-enter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
}
/* Element Staggered Entrance */
@keyframes element-enter {
0% { opacity: 0; transform: translateY(8px); }
100% { opacity: 1; transform: translateY(0); }
}
.animate-element {
opacity: 0;
animation: element-enter 0.5s cubic-bezier(0.2, 0, 0, 1) forwards;
}
.delay-75 { animation-delay: 75ms; }
.delay-150 { animation-delay: 150ms; }
.delay-250 { animation-delay: 250ms; }
.delay-300 { animation-delay: 300ms; }
/* Soft Curtain Exit */
@keyframes curtain-exit {
0% { opacity: 1; transform: translateY(0); }
100% { opacity: 0; transform: translateY(-12px); }
}
.animate-curtain-exit {
animation: curtain-exit 0.6s ease-in forwards;
pointer-events: none;
}
/* Clean Input Auto-fill Overrides */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
-webkit-box-shadow: 0 0 0 30px #14172B inset !important;
-webkit-text-fill-color: #EEF0FF !important;
transition: background-color 5000s ease-in-out 0s;
}
</style></head>
  <body class="text-[#EEF0FF] selection:bg-[#7C6FCD]/30">
    <!-- Main Mobile Canvas -->
    <main id="app-container" class="max-w-[390px] mx-auto min-h-[100dvh] h-full flex flex-col relative overflow-hidden animate-fade-up">
      <!-- Top Area: Progress -->
      <header class="px-6 pt-14 pb-4 flex items-center justify-between z-10">
        <div class="flex items-center gap-1.5">
          <div class="w-4 h-1 rounded-full bg-[#7C6FCD]"></div>
          <div class="w-4 h-1 rounded-full bg-[#7C6FCD]"></div>
          <div class="w-4 h-1 rounded-full bg-[#7C6FCD]"></div>
          <div class="w-4 h-1 rounded-full bg-[#7C6FCD]"></div>
          <div class="w-4 h-1 rounded-full bg-[#EEF0FF]"></div>
        </div>
        <span class="text-xs font-medium text-[#8A8FA8] tracking-wide">
          5 of 5
        </span>
      </header>

      <!-- Content Area -->
      <section class="px-6 flex-1 flex flex-col pt-6 z-10">
        <!-- Headers -->
        <div class="animate-element delay-75">
          <h1 class="text-2xl font-semibold tracking-tight text-[#EEF0FF] mb-2">
            What should we call you?
          </h1>
          <p class="text-base text-[#8A8FA8]">You can skip this.</p>
        </div>

        <!-- Input Surface -->
        <div class="animate-element delay-150 mt-10 w-full relative group">
          <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-[#4A4E6A] group-focus-within:text-[#A89CE0] transition-colors duration-400">
            <iconify-icon icon="solar:user-rounded-linear" width="22" height="22"></iconify-icon>
          </div>
          <input type="text" id="name-input" placeholder="Name" class="w-full h-[64px] bg-[#14172B] hover:bg-[#1C2040]/70 focus:bg-[#1C2040] text-[#EEF0FF] text-lg rounded-[20px] pl-[52px] pr-5 outline-none transition-all duration-400 focus:ring-1 focus:ring-[#A89CE0]/40 focus:shadow-[0_0_16px_rgba(168,156,224,0.12)] placeholder-[#4A4E6A]" autocomplete="off" spellcheck="false">
        </div>

        <!-- Privacy Reassurance -->
        <div class="animate-element delay-250 mt-4 px-2 flex items-center gap-2">
          <iconify-icon icon="solar:shield-check-linear" width="16" height="16" class="text-[#4A4E6A]"></iconify-icon>
          <span class="text-sm text-[#8A8FA8]">
            Only used to personalize greetings.
          </span>
        </div>
      </section>

      <!-- Bottom Area: Actions -->
      <footer class="px-6 pb-12 pt-4 flex flex-col gap-2 mt-auto animate-element delay-300 z-10">
        <!-- Primary Action -->
        <button id="continue-btn" disabled="" class="w-full h-[52px] rounded-[20px] bg-[#1C2040] text-[#8A8FA8]/50 text-base font-medium transition-all duration-300 pointer-events-none select-none flex items-center justify-center">
          Continue
        </button>

        <!-- Secondary Action -->
        <button id="skip-btn" class="w-full h-[44px] rounded-[20px] text-base text-[#8A8FA8] hover:text-[#EEF0FF] font-medium transition-colors duration-300 flex items-center justify-center select-none">
          Skip for now
        </button>
      </footer>

      <!-- Soft Background Ambient Glow (Optional Depth) -->
    </main>

    <!-- Interactivity Script -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('name-input');
        const continueBtn = document.getElementById('continue-btn');
        const skipBtn = document.getElementById('skip-btn');
        const appContainer = document.getElementById('app-container');

        // Handle Input State changes for the Primary Button
        input.addEventListener('input', (e) => {
          const value = e.target.value.trim();

          if (value.length > 0) {
            // Filled State
            continueBtn.removeAttribute('disabled');
            continueBtn.className = "w-full h-[52px] rounded-[20px] bg-[#7C6FCD] text-[#EEF0FF] text-base font-medium transition-all duration-300 shadow-[0_8px_20px_rgba(124,111,205,0.25)] hover:bg-[#6A5EBA] active:scale-[0.98] select-none flex items-center justify-center cursor-pointer";

            // Soften the skip button slightly when active to draw attention to Continue
            skipBtn.classList.replace('text-[#8A8FA8]', 'text-[#4A4E6A]');
          } else {
            // Empty State
            continueBtn.setAttribute('disabled', 'true');
            continueBtn.className = "w-full h-[52px] rounded-[20px] bg-[#1C2040] text-[#8A8FA8]/50 text-base font-medium transition-all duration-300 pointer-events-none select-none flex items-center justify-center";

            // Restore skip button prominence
            skipBtn.classList.replace('text-[#4A4E6A]', 'text-[#8A8FA8]');
          }
        });

        // Soft exit transition simulation on button clicks
        const triggerExit = () => {
          appContainer.classList.remove('animate-fade-up');
          appContainer.classList.add('animate-curtain-exit');
        };

        continueBtn.addEventListener('click', () => triggerExit());
        skipBtn.addEventListener('click', () => triggerExit());
      });
    </script>
  
</body></html>
