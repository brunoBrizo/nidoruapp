<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nidoru - Sleep Baseline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;family=Nunito:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #0D0F1A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      /* Fonts */
      .font-inter {
        font-family: 'Inter', sans-serif;
      }

      /* Screen Entrance */
      @keyframes fade-up-enter {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fade-up-enter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
      }

      /* Element Staggered Entrance */
      @keyframes element-enter {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-element {
        opacity: 0;
        animation: element-enter 0.5s cubic-bezier(0.2, 0, 0, 1) forwards;
      }
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }

      /* Soft Curtain Exit */
      @keyframes curtain-exit {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-12px); }
      }
      .animate-curtain-exit {
        animation: curtain-exit 0.6s ease-in forwards;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen text-[#EEF0FF]">
    <!-- Native Screen Canvas (390x844), Flat/No Chrome -->
    <div id="screen-container" class="w-full max-w-[390px] min-h-screen bg-[#0D0F1A] relative flex flex-col animate-fade-up select-none overflow-hidden mx-auto shadow-2xl">
      <!-- Top Area: Header & Context -->
      <div class="px-6 pt-14 pb-6">
        <div class="flex items-center justify-between mb-8 w-full">
          <div class="flex items-center gap-1.5 w-24">
            <div class="h-1 flex-1 bg-[#A89CE0] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#A89CE0] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#232743] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#232743] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#232743] rounded-full"></div>
          </div>
          <span class="text-sm text-[#8A8FA8] font-medium tracking-wide">
            2 of 5
          </span>
        </div>
        <h1 class="text-2xl font-semibold text-[#EEF0FF] tracking-tight mb-3 leading-tight">
          How do you sleep most nights?
        </h1>
        <p class="text-base text-[#8A8FA8] leading-relaxed">
          A rough sense is enough.
        </p>
      </div>

      <!-- Middle Area: Scale Card -->
      <div class="px-6 flex-1 content-start mt-2">
        <div class="bg-[#14172B] rounded-[32px] pt-8 pb-5 px-4 flex flex-col items-center relative animate-element delay-100 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.02)]">
          <!-- Decorative Connecting Track -->
          <div class="absolute top-[55px] left-[10%] right-[10%] h-[2px] bg-[#232743] rounded-full z-0"></div>

          <!-- 1-5 Scale Grid -->
          <div class="grid grid-cols-5 w-full relative z-10">
            <!-- Point 1: Rough -->
            <button class="scale-point group flex flex-col items-center gap-2 w-full outline-none" aria-selected="false" data-summary="Rough most nights">
              <div class="w-[46px] h-[46px] rounded-full bg-[#1C2040] text-[#8A8FA8] flex items-center justify-center transition-all duration-300 group-aria-selected:bg-[#1C2040] group-aria-selected:text-[#EEF0FF] group-aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_8px_20px_rgba(124,111,205,0.15)] group-aria-selected:scale-[1.12] group-active:scale-95 relative z-10">
                <span class="font-inter text-xl font-medium relative z-10">
                  1
                </span>
                <div class="absolute inset-0 bg-[#A89CE0] blur-[10px] opacity-0 group-aria-selected:opacity-20 rounded-full transition-opacity duration-500"></div>
              </div>
              <span class="text-xs text-center text-[#8A8FA8] group-aria-selected:text-[#A89CE0] transition-colors duration-300 leading-snug">
                Rough
              </span>
            </button>

            <!-- Point 2: Restless -->
            <button class="scale-point group flex flex-col items-center gap-2 w-full outline-none" aria-selected="false" data-summary="Restless most nights">
              <div class="w-[46px] h-[46px] rounded-full bg-[#1C2040] text-[#8A8FA8] flex items-center justify-center transition-all duration-300 group-aria-selected:bg-[#1C2040] group-aria-selected:text-[#EEF0FF] group-aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_8px_20px_rgba(124,111,205,0.15)] group-aria-selected:scale-[1.12] group-active:scale-95 relative z-10">
                <span class="font-inter text-xl font-medium relative z-10">
                  2
                </span>
                <div class="absolute inset-0 bg-[#A89CE0] blur-[10px] opacity-0 group-aria-selected:opacity-20 rounded-full transition-opacity duration-500"></div>
              </div>
              <span class="text-xs text-center text-[#8A8FA8] group-aria-selected:text-[#A89CE0] transition-colors duration-300 leading-snug">
                Restless
              </span>
            </button>

            <!-- Point 3: Mixed (Pre-selected) -->
            <button class="scale-point group flex flex-col items-center gap-2 w-full outline-none" aria-selected="false" data-summary="Mixed most nights">
              <div class="w-[46px] h-[46px] rounded-full bg-[#1C2040] text-[#8A8FA8] flex items-center justify-center transition-all duration-300 group-aria-selected:bg-[#1C2040] group-aria-selected:text-[#EEF0FF] group-aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_8px_20px_rgba(124,111,205,0.15)] group-aria-selected:scale-[1.12] group-active:scale-95 relative z-10">
                <span class="font-inter text-xl font-medium relative z-10">
                  3
                </span>
                <div class="absolute inset-0 bg-[#A89CE0] blur-[10px] opacity-0 group-aria-selected:opacity-20 rounded-full transition-opacity duration-500"></div>
              </div>
              <span class="text-xs text-center text-[#8A8FA8] group-aria-selected:text-[#A89CE0] transition-colors duration-300 leading-snug">
                Mixed
              </span>
            </button>

            <!-- Point 4: Mostly okay -->
            <button class="scale-point group flex flex-col items-center gap-2 w-full outline-none" aria-selected="false" data-summary="Okay most nights">
              <div class="w-[46px] h-[46px] rounded-full bg-[#1C2040] text-[#8A8FA8] flex items-center justify-center transition-all duration-300 group-aria-selected:bg-[#1C2040] group-aria-selected:text-[#EEF0FF] group-aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_8px_20px_rgba(124,111,205,0.15)] group-aria-selected:scale-[1.12] group-active:scale-95 relative z-10">
                <span class="font-inter text-xl font-medium relative z-10">
                  4
                </span>
                <div class="absolute inset-0 bg-[#A89CE0] blur-[10px] opacity-0 group-aria-selected:opacity-20 rounded-full transition-opacity duration-500"></div>
              </div>
              <span class="text-xs text-center text-[#8A8FA8] group-aria-selected:text-[#A89CE0] transition-colors duration-300 leading-snug">
                Okay
              </span>
            </button>

            <!-- Point 5: Rested -->
            <button class="scale-point group flex flex-col items-center gap-2 w-full outline-none" aria-selected="false" data-summary="Rested most nights">
              <div class="w-[46px] h-[46px] rounded-full bg-[#1C2040] text-[#8A8FA8] flex items-center justify-center transition-all duration-300 group-aria-selected:bg-[#1C2040] group-aria-selected:text-[#EEF0FF] group-aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_8px_20px_rgba(124,111,205,0.15)] group-aria-selected:scale-[1.12] group-active:scale-95 relative z-10">
                <span class="font-inter text-xl font-medium relative z-10">
                  5
                </span>
                <div class="absolute inset-0 bg-[#A89CE0] blur-[10px] opacity-0 group-aria-selected:opacity-20 rounded-full transition-opacity duration-500"></div>
              </div>
              <span class="text-xs text-center text-[#8A8FA8] group-aria-selected:text-[#A89CE0] transition-colors duration-300 leading-snug">
                Rested
              </span>
            </button>
          </div>

          <!-- Divider & Summary Status -->
          <div class="w-[80%] h-[1px] bg-gradient-to-r from-transparent via-[#232743] to-transparent mt-6 mb-3"></div>
          <p id="scale-summary" class="text-sm font-medium text-[#EEF0FF] transition-opacity duration-300">
            &nbsp;
          </p>
        </div>
      </div>

      <!-- Bottom Area: Quiet CTA -->
      <div class="px-6 pb-16 mt-auto animate-element delay-200">
        <!-- Button is fully visible since '3' is pre-selected. Logic supports re-enabling if modified. -->
        <button id="continue-btn" class="w-full bg-[#1C2040] hover:bg-[#232743] text-[#EEF0FF] text-base font-medium py-4 rounded-[20px] transition-all duration-300 ease-out active:scale-[0.98] opacity-0 translate-y-4 pointer-events-none">
          Continue
        </button>
      </div>
    </div>

    <!-- Interaction Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const points = document.querySelectorAll('.scale-point');
        const summaryText = document.getElementById('scale-summary');
        const continueBtn = document.getElementById('continue-btn');
        const screenContainer = document.getElementById('screen-container');

        // Handle tile selection
        points.forEach(point => {
          point.addEventListener('click', () => {
            // Reset all
            points.forEach(p => p.setAttribute('aria-selected', 'false'));

            // Activate chosen
            point.setAttribute('aria-selected', 'true');

            // Softly crossfade summary text
            summaryText.style.opacity = '0';
            setTimeout(() => {
              summaryText.textContent = point.getAttribute('data-summary');
              summaryText.style.opacity = '1';
            }, 200);

            // Ensure continue button is revealed (if we started without selection)
            continueBtn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            continueBtn.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
          });
        });

        // Handle auto-advance curtain exit
        continueBtn.addEventListener('click', () => {
          screenContainer.classList.add('animate-curtain-exit');

          // Mimicking the transition to Screen 5
          setTimeout(() => {
            console.log("Proceed to next question...");
          }, 600);
        });
      });
    </script>
  
</body></html>
