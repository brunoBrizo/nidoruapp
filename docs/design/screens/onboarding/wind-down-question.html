<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nidoru - Wind-down Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Nunito:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #0D0F1A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      /* Fonts */
      .font-inter {
        font-family: 'Inter', sans-serif;
      }

      /* Screen Entrance */
      @keyframes fade-up-enter {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fade-up-enter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
      }

      /* Element Staggered Entrance */
      @keyframes element-enter {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-element {
        opacity: 0;
        animation: element-enter 0.5s cubic-bezier(0.2, 0, 0, 1) forwards;
      }
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }

      /* Soft Curtain Exit */
      @keyframes curtain-exit {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-12px); }
      }
      .animate-curtain-exit {
        animation: curtain-exit 0.6s ease-in forwards;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen text-[#EEF0FF]">
    <!-- Native Screen Canvas (390x844), Flat/No Chrome -->
    <div id="screen-container" class="w-full max-w-[390px] min-h-screen bg-[#0D0F1A] relative flex flex-col animate-fade-up select-none overflow-hidden mx-auto shadow-2xl">
      <!-- Top Area: Header & Context -->
      <div class="px-6 pt-14 pb-6">
        <div class="flex items-center justify-between mb-8 w-full">
          <div class="flex items-center gap-1.5 w-24">
            <div class="h-1 flex-1 bg-[#A89CE0] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#A89CE0] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#A89CE0] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#232743] rounded-full"></div>
            <div class="h-1 flex-1 bg-[#232743] rounded-full"></div>
          </div>
          <span class="text-sm text-[#8A8FA8] font-medium tracking-wide">
            3 of 5
          </span>
        </div>
        <h1 class="text-2xl font-semibold text-[#EEF0FF] tracking-tight mb-3 leading-tight">
          When do you usually
          <br>
          wind down?
        </h1>
        <p class="text-base text-[#8A8FA8] leading-relaxed">
          We’ll time your evening plan around this.
        </p>
      </div>

      <!-- Middle Area: Picker Card -->
      <div class="px-6 flex-1 content-start mt-2">
        <div class="bg-[#14172B] rounded-[32px] pt-7 pb-6 px-4 flex flex-col items-center relative animate-element delay-100 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.02)]">
          <!-- Quick Presets -->
          <div class="flex items-center justify-center gap-3 w-full mb-8 relative z-20">
            <button class="preset-btn px-4 py-2 rounded-full bg-[#1C2040] text-[#8A8FA8] text-sm font-medium transition-all duration-300 aria-selected:bg-[#1C2040] aria-selected:text-[#EEF0FF] aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_4px_12px_rgba(124,111,205,0.15)] active:scale-[0.96] outline-none" aria-selected="false" data-hour="09" data-min="30" data-caption="Usually around 9:30 PM">
              9:30 PM
            </button>
            <button class="preset-btn px-4 py-2 rounded-full bg-[#1C2040] text-[#8A8FA8] text-sm font-medium transition-all duration-300 aria-selected:bg-[#1C2040] aria-selected:text-[#EEF0FF] aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_4px_12px_rgba(124,111,205,0.15)] active:scale-[0.96] outline-none" aria-selected="false" data-hour="10" data-min="00" data-caption="Usually around 10:00 PM">
              10:00 PM
            </button>
            <button class="preset-btn px-4 py-2 rounded-full bg-[#1C2040] text-[#8A8FA8] text-sm font-medium transition-all duration-300 aria-selected:bg-[#1C2040] aria-selected:text-[#EEF0FF] aria-selected:shadow-[inset_0_0_0_1px_rgba(168,156,224,0.4),0_4px_12px_rgba(124,111,205,0.15)] active:scale-[0.96] outline-none" aria-selected="true" data-hour="10" data-min="30" data-caption="Usually around 10:30 PM">
              10:30 PM
            </button>
          </div>

          <!-- Time Wheel -->
          <div class="relative w-full max-w-[260px] h-[180px] flex items-center justify-center select-none overflow-hidden rounded-[20px]">
            <!-- Center Highlight Band -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-[60px] bg-[#1C2040] rounded-[16px] shadow-[inset_0_0_0_1px_rgba(168,156,224,0.2),0_8px_20px_rgba(124,111,205,0.1)] z-0">
              <div class="absolute inset-0 bg-[#A89CE0] blur-[14px] opacity-[0.12] rounded-[16px]"></div>
            </div>

            <!-- Soft Fade Masks -->
            <div class="absolute top-0 inset-x-0 h-[60px] bg-gradient-to-b from-[#14172B] via-[#14172B]/80 to-transparent z-20 pointer-events-none"></div>
            <div class="absolute bottom-0 inset-x-0 h-[60px] bg-gradient-to-t from-[#14172B] via-[#14172B]/80 to-transparent z-20 pointer-events-none"></div>

            <!-- Columns Container -->
            <div class="w-full flex justify-center items-center z-10 gap-[18px] tabular-nums">
              <!-- Hour Column -->
              <div class="flex flex-col items-center gap-[22px] w-[54px] transition-all duration-500 ease-out">
                <div class="text-[22px] font-inter text-[#A0A5C0] font-medium h-[24px] flex items-center justify-center" id="hour-prev">
                  09
                </div>
                <div class="text-[38px] font-inter text-[#EEF0FF]/90 font-light h-[48px] flex items-center justify-center tracking-tight" id="hour-curr">
                  10
                </div>
                <div class="text-[22px] font-inter text-[#A0A5C0] font-medium h-[24px] flex items-center justify-center" id="hour-next">
                  11
                </div>
              </div>

              <!-- Colon Separator -->
              <div class="text-[30px] font-inter text-[#8A8FA8] font-light pb-[4px] relative z-10 w-[12px] flex justify-center items-center">
                :
              </div>

              <!-- Minute Column -->
              <div class="flex flex-col items-center gap-[22px] w-[54px] transition-all duration-500 ease-out">
                <div class="text-[22px] font-inter text-[#A0A5C0] font-medium h-[24px] flex items-center justify-center" id="min-prev">
                  25
                </div>
                <div class="text-[38px] font-inter text-[#EEF0FF]/90 font-light h-[48px] flex items-center justify-center tracking-tight" id="min-curr">
                  30
                </div>
                <div class="text-[22px] font-inter text-[#A0A5C0] font-medium h-[24px] flex items-center justify-center" id="min-next">
                  35
                </div>
              </div>

              <!-- AM/PM Column -->
              <div class="flex flex-col items-center gap-[22px] w-[46px]">
                <div class="text-[18px] font-inter text-[#8A8FA8] font-medium h-[24px] flex items-center justify-center opacity-0">
                  PM
                </div>
                <div class="text-[20px] font-inter text-[#EEF0FF]/90 font-normal h-[48px] flex items-center justify-center tracking-wide">
                  PM
                </div>
                <div class="text-[18px] font-inter text-[#8A8FA8] font-medium h-[24px] flex items-center justify-center opacity-0">
                  AM
                </div>
              </div>
            </div>
          </div>

          <!-- Divider & Caption -->
          <div class="w-[80%] h-[1px] bg-gradient-to-r from-transparent via-[#232743] to-transparent mt-8 mb-4"></div>
          <p id="time-caption" class="text-[15px] font-medium text-[#8A8FA8] transition-opacity duration-300">
            Usually around 10:30 PM
          </p>
        </div>
      </div>

      <!-- Bottom Area: Quiet CTA -->
      <div class="px-6 pb-16 mt-auto animate-element delay-200">
        <!-- Button is enabled out of the gate since a time is pre-selected -->
        <button id="continue-btn" class="w-full bg-[#1C2040] hover:bg-[#232743] text-[#EEF0FF] text-base font-medium py-4 rounded-[20px] transition-all duration-300 ease-out active:scale-[0.98]">
          Continue
        </button>
      </div>
    </div>

    <!-- Interaction Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const presets = document.querySelectorAll('.preset-btn');
        const captionText = document.getElementById('time-caption');
        const continueBtn = document.getElementById('continue-btn');
        const screenContainer = document.getElementById('screen-container');

        // Elements for visually updating the wheel
        const hourPrev = document.getElementById('hour-prev');
        const hourCurr = document.getElementById('hour-curr');
        const hourNext = document.getElementById('hour-next');
        const minPrev = document.getElementById('min-prev');
        const minCurr = document.getElementById('min-curr');
        const minNext = document.getElementById('min-next');

        const pad = (n) => n.toString().padStart(2, '0');

        // Handle preset chip selection
        presets.forEach(preset => {
          preset.addEventListener('click', () => {
            // Reset all
            presets.forEach(p => p.setAttribute('aria-selected', 'false'));

            // Activate chosen
            preset.setAttribute('aria-selected', 'true');

            // Softly crossfade caption text
            captionText.style.opacity = '0';
            setTimeout(() => {
              captionText.textContent = preset.getAttribute('data-caption');
              captionText.style.opacity = '1';
            }, 200);

            // Mock updating the wheel values visually
            const h = parseInt(preset.getAttribute('data-hour'), 10);
            const m = parseInt(preset.getAttribute('data-min'), 10);

            hourPrev.textContent = pad(h === 1 ? 12 : h - 1);
            hourCurr.textContent = pad(h);
            hourNext.textContent = pad(h === 12 ? 1 : h + 1);

            minPrev.textContent = pad(m === 0 ? 55 : m - 5);
            minCurr.textContent = pad(m);
            minNext.textContent = pad(m === 55 ? 0 : m + 5);
          });
        });

        // Handle auto-advance curtain exit
        continueBtn.addEventListener('click', () => {
          screenContainer.classList.add('animate-curtain-exit');

          // Mimicking the transition to Screen 6
          setTimeout(() => {
            console.log("Proceed to next question...");
          }, 600);
        });
      });
    </script>
  
</body></html>
