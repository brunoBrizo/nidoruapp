<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>nidoru - Your Plan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Nunito:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
body {
font-family: 'Nunito', sans-serif;
background-color: #0D0F1A;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
margin: 0;
padding: 0;
}
/* Screen Entrance */
@keyframes fade-up-enter {
0% { opacity: 0; transform: translateY(12px); }
100% { opacity: 1; transform: translateY(0); }
}
.animate-fade-up {
animation: fade-up-enter 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
}
/* Element Staggered Entrance */
@keyframes element-enter {
0% { opacity: 0; transform: translateY(8px); }
100% { opacity: 1; transform: translateY(0); }
}
.animate-element {
opacity: 0;
animation: element-enter 0.5s cubic-bezier(0.2, 0, 0, 1) forwards;
}
.delay-75 { animation-delay: 75ms; }
.delay-150 { animation-delay: 150ms; }
.delay-300 { animation-delay: 300ms; }
/* Soft Curtain Exit */
@keyframes curtain-exit {
0% { opacity: 1; transform: translateY(0); }
100% { opacity: 0; transform: translateY(-12px); }
}
.animate-curtain-exit {
animation: curtain-exit 0.6s ease-in forwards;
pointer-events: none;
}
/* Gentle Orb Pulses */
@keyframes orb-pulse {
0%, 100% { opacity: 0.2; transform: scale(1); }
50% { opacity: 0.4; transform: scale(1.05); }
}
.animate-orb-pulse {
animation: orb-pulse 4s ease-in-out infinite;
}
@keyframes core-pulse {
0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(168,156,224,0.4); }
50% { transform: scale(1.02); box-shadow: 0 0 32px rgba(168,156,224,0.6); }
}
.animate-core-pulse {
animation: core-pulse 4s ease-in-out infinite;
}
</style></head>
  <body class="text-[#EEF0FF] selection:bg-[#7C6FCD]/30">
    <!-- Main Mobile Canvas -->
    <main id="app-container" class="max-w-[390px] mx-auto min-h-[100dvh] h-full flex flex-col relative overflow-hidden animate-fade-up">
      <!-- Top Area: Progress Cue -->
      <header class="px-6 pt-14 pb-4 flex justify-center items-center z-10 animate-element">
        <div class="flex items-center gap-2 px-3 py-1.5 bg-[#14172B]/60 rounded-full border border-[#1E2236]">
          <div class="w-1.5 h-1.5 rounded-full bg-[#7C6FCD]"></div>
          <span class="text-xs text-[#8A8FA8] tracking-wide font-medium">
            Your first session is ready
          </span>
        </div>
      </header>

      <!-- Content Area -->
      <section class="px-6 flex-1 flex flex-col justify-center pt-2 pb-8 z-10">
        <!-- Main Title -->
        <div class="animate-element delay-75 mb-6 text-center">
          <h1 class="text-2xl font-semibold tracking-tight text-[#EEF0FF]">
            Your plan
          </h1>
          <p class="text-[#A89CE0] text-[15px] font-medium mt-1">
            General Wellness
          </p>
        </div>

        <!-- Plan Detail Surface -->
        <div class="animate-element delay-150 w-full bg-gradient-to-b from-[#1C2040] to-[#14172B] rounded-[28px] shadow-[0_16px_40px_rgba(0,0,0,0.4)] border border-[#7C6FCD]/20 p-6 relative overflow-hidden flex flex-col">
          <div class="absolute top-0 left-0 w-[160px] h-[160px] bg-[#7C6FCD]/15 rounded-full blur-[50px] pointer-events-none"></div>
          <div class="relative w-full z-10 flex flex-col gap-6 text-left">
            <div class="flex items-start gap-4">
              <div class="relative w-12 h-12 flex-shrink-0 mt-0.5 flex items-center justify-center">
                <div class="absolute inset-[-4px] rounded-full bg-[#A89CE0]/20 blur-[8px] animate-orb-pulse"></div>
                <div class="absolute inset-2 rounded-full bg-[#7C6FCD] blur-[1px] shadow-[0_0_15px_rgba(168,156,224,0.6)] animate-core-pulse"></div>
                <div class="absolute inset-3.5 rounded-full bg-[#E0DDF5] blur-[3px]"></div>
              </div>
              <div class="flex flex-col">
                <span class="text-[13px] font-medium tracking-wide text-[#A89CE0] mb-1.5">
                  First session
                </span>
                <h2 class="text-[20px] leading-tight font-semibold tracking-tight text-[#EEF0FF] mb-1.5">
                  4 min guided breathing
                </h2>
                <p class="text-[14px] font-normal text-[#8A8FA8] leading-relaxed">
                  Gentle cues for your 10:30 PM wind-down
                </p>
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <div class="bg-[#14172B]/80 border border-[#7C6FCD]/30 rounded-full px-3 py-1.5 flex items-center gap-1.5">
                <iconify-icon icon="solar:clock-circle-linear" class="text-[#A89CE0]" width="14" height="14"></iconify-icon>
                <span class="text-[13px] font-medium text-[#EEF0FF]/90">
                  4 min
                </span>
              </div>
              <div class="bg-[#14172B]/80 border border-[#7C6FCD]/30 rounded-full px-3 py-1.5 flex items-center gap-1.5">
                <iconify-icon icon="solar:soundwave-linear" class="text-[#A89CE0]" width="14" height="14"></iconify-icon>
                <span class="text-[13px] font-medium text-[#EEF0FF]/90">
                  Gentle guidance
                </span>
              </div>
              <div class="bg-[#14172B]/80 border border-[#7C6FCD]/30 rounded-full px-3 py-1.5 flex items-center gap-1.5">
                <iconify-icon icon="solar:user-circle-linear" class="text-[#A89CE0]" width="14" height="14"></iconify-icon>
                <span class="text-[13px] font-medium text-[#EEF0FF]/90">
                  No account needed
                </span>
              </div>
            </div>
          </div>
        </div>
        <div class="animate-element delay-150 mt-4 w-full bg-gradient-to-b from-[#14172B]/60 to-[#0D0F1A]/20 border border-[#1E2236] rounded-[24px] p-4 flex flex-col gap-3 relative overflow-hidden">
          <div class="flex items-center gap-2 relative z-10">
            <iconify-icon icon="solar:checklist-minimalistic-linear" class="text-[#7C6FCD]" width="16" height="16"></iconify-icon>
            <span class="text-[12px] font-semibold tracking-wide uppercase text-[#8A8FA8]">
              Based on your answers
            </span>
          </div>
          <div class="flex flex-col gap-2.5 relative z-10">
            <div class="flex items-center gap-3">
              <div class="w-5 flex items-center justify-center flex-shrink-0">
                <iconify-icon icon="solar:moon-stars-linear" class="text-[#7C6FCD]" width="18" height="18"></iconify-icon>
              </div>
              <span class="text-[14px] font-medium text-[#EEF0FF]/80">
                Wind-down around 10:30 PM
              </span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-5 flex items-center justify-center flex-shrink-0">
                <iconify-icon icon="solar:lungs-linear" class="text-[#7C6FCD]" width="18" height="18"></iconify-icon>
              </div>
              <span class="text-[14px] font-medium text-[#EEF0FF]/80">
                New to breathwork
              </span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-5 flex items-center justify-center flex-shrink-0">
                <iconify-icon icon="solar:leaf-linear" class="text-[#7C6FCD]" width="18" height="18"></iconify-icon>
              </div>
              <span class="text-[14px] font-medium text-[#EEF0FF]/80">
                Start simple
              </span>
            </div>
          </div>
        </div>
      </section>

      <!-- Bottom Area: Primary Action -->
      <footer class="px-6 pb-12 pt-4 flex flex-col gap-2 mt-auto animate-element delay-300 z-10 bg-gradient-to-t from-[#0D0F1A] via-[#0D0F1A] to-transparent">
        <button id="start-btn" class="w-full h-[54px] rounded-[20px] bg-[#3C3565] text-[#EEF0FF] text-[16px] font-medium transition-all duration-300 shadow-[0_8px_20px_rgba(0,0,0,0.2)] border border-[#524B8C]/40 hover:bg-[#463E75] active:scale-[0.98] select-none flex items-center justify-center cursor-pointer">
          Let’s start
        </button>
      </footer>
    </main>

    <!-- Interactivity Script -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.getElementById('start-btn');
        const appContainer = document.getElementById('app-container');

        // Soft exit transition into the first session
        const triggerExit = () => {
          appContainer.classList.remove('animate-fade-up');
          appContainer.classList.add('animate-curtain-exit');
        };

        startBtn.addEventListener('click', () => triggerExit());
      });
    </script>
  
</body></html>
