<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nidoru - Dark Playback Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Nunito:wght@300;400;500&amp;display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #000;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }
      .font-inter {
        font-family: 'Inter', sans-serif;
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 24px);
      }

      @keyframes soft-pulse {
        0%, 100% {
          opacity: 0.8;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.98);
        }
      }

      .animate-soft-pulse {
        animation: soft-pulse 6s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .animate-soft-pulse {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="flex justify-center min-h-screen text-[#EEF0FF] overflow-hidden bg-black selection:bg-[#7C6FCD]/30">

    <!-- Edge-to-Edge Native Screen Container - Dark Mode -->
    <!-- The entire screen is a tap target to wake the UI -->
    <main class="w-full max-w-[390px] h-[100dvh] bg-[#03040A] relative flex flex-col justify-center items-center z-0 overflow-hidden cursor-pointer active:scale-[0.99] transition-transform duration-500" aria-label="Tap to show controls" role="button">
      <!-- Extremely subtle ambient background depth -->
      <div class="absolute inset-0 bg-gradient-to-b from-[#0D0F1A]/20 to-transparent pointer-events-none"></div>

      <!-- Main Playback Cluster -->
      <div class="relative flex flex-col items-center z-10 w-full px-6 -mt-10">

        <!-- Timer Progress Ring & Icon -->
        <div class="relative w-28 h-28 flex items-center justify-center mb-8 animate-soft-pulse">
          <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 112 112">
            <!-- Background track (Haze) -->
            <circle cx="56" cy="56" r="52" fill="none" stroke="#4A4E6A" stroke-opacity="0.15" stroke-width="1.5"></circle>
            <!-- Active progress (Iris) -->
            <!-- Circumference is ~326, dashoffset set to show mostly elapsed time -->
            <circle cx="56" cy="56" r="52" fill="none" stroke="#7C6FCD" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="326" stroke-dashoffset="24" stroke-linecap="round"></circle>
          </svg>
          <iconify-icon icon="solar:moon-sleep-linear" stroke-width="1.5" class="text-4xl text-[#7C6FCD] opacity-60"></iconify-icon>
        </div>

        <!-- Text Status -->
        <h1 class="text-2xl font-medium tracking-tight text-[#EEF0FF]/80 mb-1">
          Rain Hearth
        </h1>
        <p class="text-sm font-light text-[#8A8FA8]/70 tracking-wide mb-10">
          Playing softly
        </p>

        <!-- Active Layers Indicators (Dimmed) -->
        <div class="flex flex-wrap justify-center gap-2 mb-12 max-w-[280px]">
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#0D0F1A]/40 border border-[#1E2236]/30">
            <iconify-icon icon="solar:cloud-water-linear" class="text-sm text-[#7C6FCD]/40"></iconify-icon>
            <span class="text-xs font-medium text-[#8A8FA8]/60 tracking-wide">Light Rain</span>
          </div>
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#0D0F1A]/40 border border-[#1E2236]/30">
            <iconify-icon icon="solar:chart-square-linear" class="text-sm text-[#7C6FCD]/40"></iconify-icon>
            <span class="text-xs font-medium text-[#8A8FA8]/60 tracking-wide">Brown Noise</span>
          </div>
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#0D0F1A]/40 border border-[#1E2236]/30">
            <iconify-icon icon="solar:fire-linear" class="text-sm text-[#7C6FCD]/40"></iconify-icon>
            <span class="text-xs font-medium text-[#8A8FA8]/60 tracking-wide">Fireplace</span>
          </div>
        </div>

        <!-- Fade Timing -->
        <div class="flex flex-col items-center">
          <p class="text-sm font-medium text-[#EEF0FF]/60 tracking-wide mb-1.5">
            Fade starts in <span class="font-inter tabular-nums">28 min</span>
          </p>
          <p class="text-xs font-light text-[#4A4E6A] tracking-wide">
            Then fades out softly
          </p>
        </div>
      </div>

      <!-- Tap-to-Wake Hint -->
      <div class="absolute bottom-10 left-0 right-0 flex justify-center pb-safe z-10 pointer-events-none">
        <span class="text-xs font-medium text-[#8A8FA8]/40 tracking-wider uppercase opacity-80">
          Tap to show controls
        </span>
      </div>

    </main>

</body></html>
